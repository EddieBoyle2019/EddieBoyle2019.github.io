<div id="map"></div>

<script>

	const map = L.map('map').setView([56.0, -3.72], 10);

	const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
		maxZoom: 19,
		attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
	}).addTo(map);

	const marker = L.marker([56.11, -3.93]).addTo(map)
		.bindPopup("<b>River Forth</b><p><img width=300px height=225px src='River_Forth_near_Stirling.jpg'></p><p>The River Forth is a major river in central Scotland, 47 km (29 mi) long, which drains into the North Sea on the east coast of the country. Its drainage basin covers much of Stirlingshire in Scotland's Central Belt. The Gaelic name for the upper reach of the river, above Stirling, is Abhainn Dubh, meaning 'black river'. The name for the river below the tidal reach (just past where it is crossed by the M9 motorway) is Uisge For.</p><a href='https://en.wikipedia.org/wiki/River_Forth'>Wikipedia</a>", {offset: [200, 150]});

L.control.scale({position:'bottomleft'}).addTo(map);

</script>
